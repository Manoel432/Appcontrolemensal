<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Dojo Impacto Social | Controle de Mensalidades</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary-red: #e53935;
      --primary-red-dark: #c62828;
      --primary-red-light: #ff6b6b;
      --accent-gold: #ffd700;
      --accent-gold-dark: #f9a825;
      --accent-gold-light: #ffe082;
      --bg-dark: #0a0f1a;
      --bg-card: rgba(15, 25, 35, 0.92);
      --bg-input: rgba(10, 20, 28, 0.95);
      --text-white: #ffffff;
      --text-offwhite: #f5f5f5;
      --text-gold: #ffd966;
      --text-gray: #b0bec5;
      --border-glow: rgba(255, 215, 0, 0.3);
      --shadow-lg: 0 25px 45px rgba(0, 0, 0, 0.5);
      --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.3);
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --success-green: #2ecc71;
      --success-green-dark: #27ae60;
      --warning-orange: #f39c12;
      --danger-red: #e74c3c;
      --whatsapp-green: #25D366;
      --overlay: rgba(0, 0, 0, 0.6);
      
      --border-radius-lg: 1.5rem;
      --border-radius-md: 1rem;
      --border-radius-sm: 0.75rem;
      --border-radius-pill: 50px;
      --font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    [data-theme="light"] {
      --bg-dark: #f8fafc;
      --bg-card: rgba(255, 255, 255, 0.95);
      --bg-input: #ffffff;
      --text-white: #1e293b;
      --text-offwhite: #334155;
      --text-gold: #b45309;
      --text-gray: #64748b;
      --border-glow: rgba(180, 83, 9, 0.2);
      --shadow-lg: 0 25px 45px rgba(0, 0, 0, 0.15);
      --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.1);
      --overlay: rgba(0, 0, 0, 0.4);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #0c1a24 50%, var(--bg-dark) 100%);
      position: relative;
      overflow-x: hidden;
      padding: 16px;
      font-family: var(--font-family);
      color: var(--text-offwhite);
      transition: var(--transition);
    }

    .watermark {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0.04;
    }
    .watermark-logo {
      text-align: center;
      transform: rotate(-8deg) scale(1.5);
      user-select: none;
    }
    .watermark-logo div:first-child {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      background: linear-gradient(135deg, var(--accent-gold), #ff8c42);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .watermark-logo div:last-child {
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, var(--primary-red), var(--primary-red-dark));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: -12px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 20%, rgba(229, 57, 53, 0.06), transparent 60%);
      pointer-events: none;
      z-index: 1;
    }

    .dashboard {
      max-width: 1500px;
      margin: 0 auto;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-lg), 0 0 0 1px var(--border-glow);
      overflow: hidden;
      position: relative;
      z-index: 20;
      transition: var(--transition);
    }

    .hero {
      background: linear-gradient(115deg, var(--primary-red-dark) 0%, var(--primary-red) 30%, #1e2a1a 100%);
      padding: 1.2rem 1.8rem;
      border-bottom: 3px solid var(--accent-gold);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 800;
      font-family: 'Times New Roman', Times, serif;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      margin-bottom: 8px;
    }
    .hero-sub {
      font-size: 0.9rem;
      font-style: italic;
      color: rgba(255,255,240,0.9);
      letter-spacing: 1px;
      font-family: 'Times New Roman', Times, serif;
    }
    .hero h1 span {
      background: rgba(0, 0, 0, 0.35);
      padding: 5px 16px;
      border-radius: var(--border-radius-pill);
      font-size: 0.8rem;
      font-weight: 600;
      backdrop-filter: blur(4px);
      color: var(--accent-gold);
      border: 1px solid rgba(255, 215, 0, 0.3);
      font-family: var(--font-family);
    }

    .finances-panel {
      background: rgba(0, 0, 0, 0.35);
      margin: 1.2rem 1.5rem;
      padding: 1rem 1.5rem;
      border-radius: var(--border-radius-md);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-glow);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .finance-control {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .monthly-fee-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(46, 204, 113, 0.15), rgba(46, 204, 113, 0.05));
      padding: 5px 12px;
      border-radius: var(--border-radius-pill);
      border: 1px solid rgba(46, 204, 113, 0.4);
    }
    .monthly-fee-box label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--accent-gold);
    }
    .monthly-fee-box input {
      background: var(--bg-input);
      border: 1.5px solid rgba(46, 204, 113, 0.5);
      padding: 5px 10px;
      border-radius: 40px;
      color: white;
      font-weight: 700;
      font-size: 0.85rem;
      width: 85px;
      text-align: center;
      outline: none;
      transition: var(--transition);
    }

    .profit-card {
      background: linear-gradient(135deg, #1a472a, #0e2a1a);
      padding: 7px 18px;
      border-radius: var(--border-radius-pill);
      display: flex;
      align-items: baseline;
      gap: 8px;
      border: 1px solid var(--accent-gold);
      min-width: 220px;
    }
    .profit-card span:first-child {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent-gold-light);
      letter-spacing: 0.8px;
    }
    .profit-card span:last-child {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--accent-gold);
    }

    .btn-small {
      background: linear-gradient(135deg, var(--success-green), var(--success-green-dark));
      color: white;
      border: none;
      padding: 5px 14px;
      border-radius: var(--border-radius-pill);
      font-weight: 700;
      font-size: 0.68rem;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .card-panel {
      background: rgba(0, 0, 0, 0.35);
      margin: 0 1.5rem 1.2rem 1.5rem;
      padding: 1.2rem 1.6rem;
      border-radius: var(--border-radius-md);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-glow);
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
    }

    .input-group {
      flex: 2;
      min-width: 180px;
    }
    .input-group label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: var(--accent-gold);
      margin-bottom: 5px;
    }
    .input-group input, .input-group select {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid rgba(255, 215, 0, 0.45);
      padding: 11px 15px;
      border-radius: var(--border-radius-pill);
      color: var(--text-offwhite);
      font-weight: 500;
      font-size: 0.88rem;
      outline: none;
    }

    .btn {
      border: none;
      padding: 11px 20px;
      border-radius: var(--border-radius-pill);
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      flex: 1;
    }

    .btn-primary { background: linear-gradient(135deg, var(--primary-red), var(--primary-red-dark)); color: white; }
    .btn-secondary { background: linear-gradient(135deg, #2c3e50, #1e2f3a); color: var(--accent-gold); border: 1px solid rgba(255, 215, 0, 0.45); }

    .table-wrapper {
      margin: 0.8rem 1.3rem 1.8rem 1.3rem;
      overflow-x: auto;
      border-radius: var(--border-radius-md);
      background: rgba(0, 0, 0, 0.3);
      padding: 0.4rem;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    table { width: 100%; border-collapse: collapse; min-width: 1400px; }
    th { background: #1a2a30; color: var(--accent-gold); padding: 11px 5px; text-transform: uppercase; font-size: 0.68rem; border-bottom: 2px solid var(--primary-red); }
    td { background: rgba(22, 32, 40, 0.88); padding: 9px 4px; text-align: center; border-bottom: 1px solid rgba(255, 215, 0, 0.18); }

    .aluno-info { font-weight: 800; text-align: left; padding-left: 11px; min-width: 200px; color: var(--accent-gold-light); border-right: 1px solid rgba(255, 215, 0, 0.25); position: sticky; left: 0; background: #1e2e3a; z-index: 5; }
    
    .actions { display: flex; flex-direction: column; gap: 5px; align-items: center; }
    .actions button { border: none; padding: 5px 8px; border-radius: 25px; font-weight: 700; font-size: 0.6rem; color: white; cursor: pointer; width: 85px; }
    .whatsapp-btn { background: linear-gradient(135deg, #25D366, #128C7E) !important; }
    .edit-btn { background: #3498db !important; }
    .delete-btn { background: #c0392b !important; }

    /* Modais */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-card); padding: 1.8rem; border-radius: var(--border-radius-lg); max-width: 500px; width: 100%; border: 1px solid var(--border-glow); }

    #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { padding: 12px 20px; border-radius: 10px; color: white; font-weight: 600; box-shadow: var(--shadow-md); animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .success { background: var(--success-green); }
    .error { background: var(--danger-red); }
    .info { background: #3498db; }
  </style>
</head>
<body>

<div class="watermark"><div class="watermark-logo"><div>DOJO</div><div>IMPACTO SOCIAL</div></div></div>
<div id="toastContainer"></div>

<div id="modalEditar" class="modal">
  <div class="modal-content">
    <h3>✏️ Editar Aluno</h3>
    <br>
    <input type="hidden" id="editIndex">
    <div class="input-group"><label>Nome</label><input type="text" id="editNome"></div><br>
    <div class="input-group"><label>WhatsApp</label><input type="tel" id="editWhatsapp"></div><br>
    <div class="input-group"><label>Data Início</label><input type="date" id="editDataInicio"></div><br>
    <button class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
    <button class="btn btn-secondary" onclick="fecharModalEditar()">Cancelar</button>
  </div>
</div>

<div id="modalLogin" class="modal active">
  <div class="modal-content" style="text-align:center;">
    <h3>Dojo Impacto Social</h3>
    <p>Digite o PIN de acesso</p><br>
    <input type="password" id="pinInput" style="padding:10px; text-align:center; font-size:1.5rem; width:150px; border-radius:10px;"><br><br>
    <button class="btn btn-primary" onclick="verificarPIN()" style="width:100%">Entrar</button>
  </div>
</div>

<div class="dashboard" id="mainDashboard" style="display:none;">
  <div class="hero">
    <h1>DOJO IMPACTO SOCIAL · CONTROLE DE MENSALIDADES</h1>
    <div class="hero-sub">Karatê | Disciplina & Excelência</div>
  </div>

  <div class="finances-panel">
    <div class="finance-control">
      <div class="monthly-fee-box">
        <label>💰 MENSALIDADE</label>
        <input type="number" id="valorMensalidade" value="100">
        <button class="btn-small" onclick="atualizarValorMensalidade()">✓</button>
      </div>
      <button class="btn-small" onclick="backupDados()">💾 Backup</button>
    </div>
    <div class="profit-card">
      <span>📊 LUCRO MÊS ATUAL</span>
      <span id="lucroMensalDisplay">R$ 0,00</span>
    </div>
  </div>

  <div class="card-panel">
    <div class="form-row">
      <div class="input-group"><label>NOME</label><input type="text" id="nomeAluno"></div>
      <div class="input-group"><label>WHATSAPP</label><input type="tel" id="whatsappAluno" placeholder="91999999999"></div>
      <div class="btn-group"><button class="btn btn-primary" onclick="adicionarAluno()">➕ Adicionar</button></div>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>📋 ALUNO</th><th colspan="2">JAN</th><th colspan="2">FEV</th><th colspan="2">MAR</th><th colspan="2">ABR</th><th colspan="2">MAI</th><th colspan="2">JUN</th><th colspan="2">JUL</th><th colspan="2">AGO</th><th colspan="2">SET</th><th colspan="2">OUT</th><th colspan="2">NOV</th><th colspan="2">DEZ</th><th>⚙️</th></tr>
      </thead>
      <tbody id="tabelaBody"></tbody>
    </table>
  </div>
</div>

<script>
let alunos = [];
let valorMensalidade = 100;
const PIN_ACESSO = "1234";

function carregarDados() {
  const d = localStorage.getItem("impacto_dados");
  if(d) alunos = JSON.parse(d);
  const v = localStorage.getItem("impacto_valor");
  if(v) { valorMensalidade = parseFloat(v); document.getElementById('valorMensalidade').value = v; }
  renderizarTabela();
}

function salvar() {
  localStorage.setItem("impacto_dados", JSON.stringify(alunos));
  localStorage.setItem("impacto_valor", valorMensalidade);
  calcularLucro();
}

function verificarPIN() {
  const input = document.getElementById('pinInput').value;
  if(input === PIN_ACESSO) {
    document.getElementById('modalLogin').classList.remove('active');
    document.getElementById('mainDashboard').style.display = 'block';
    carregarDados();
  } else {
    alert("PIN Incorreto!");
  }
}

function adicionarAluno() {
  const nome = document.getElementById('nomeAluno').value;
  const whatsapp = document.getElementById('whatsappAluno').value;
  if(!nome) return;
  alunos.push({ 
    nome, 
    whatsapp, 
    dataInicio: new Date().toISOString().split('T')[0],
    meses: Array(12).fill(null).map(() => ({ pago: false, data: "" }))
  });
  salvar();
  renderizarTabela();
}

function renderizarTabela() {
  const body = document.getElementById('tabelaBody');
  body.innerHTML = "";
  alunos.forEach((aluno, idx) => {
    const row = body.insertRow();
    const cellNome = row.insertCell();
    cellNome.className = "aluno-info";
    cellNome.innerHTML = `<div>${aluno.nome}<br><small>${aluno.whatsapp || ""}</small></div>`;

    for(let i=0; i<12; i++) {
      const cellCheck = row.insertCell();
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = aluno.meses[i].pago;
      cb.onclick = () => { aluno.meses[i].pago = !aluno.meses[i].pago; salvar(); };
      cellCheck.appendChild(cb);

      const cellData = row.insertCell();
      const inp = document.createElement('input');
      inp.style.width = "40px";
      inp.value = aluno.meses[i].data;
      inp.onblur = (e) => { aluno.meses[i].data = e.target.value; salvar(); };
      cellData.appendChild(inp);
    }

    const cellAcoes = row.insertCell();
    cellAcoes.className = "actions";
    cellAcoes.innerHTML = `
      <button class="whatsapp-btn" onclick="enviarCobrancaWhatsApp(${idx})">Cobrar</button>
      <button class="edit-btn" onclick="editarAluno(${idx})">Editar</button>
      <button class="delete-btn" onclick="removerAluno(${idx})">Excluir</button>
    `;
  });
  calcularLucro();
}

// ==========================================
// ✅ AQUI ESTÁ A CORREÇÃO QUE VOCÊ PEDIU!
// ==========================================
function enviarCobrancaWhatsApp(idx){ 
  const aluno = alunos[idx]; 
  
  if(!aluno.whatsapp){ 
    showToast(`⚠️ ${aluno.nome} sem WhatsApp!`, 'error'); 
    return; 
  } 
  
  let num = aluno.whatsapp.replace(/\D/g,''); 
  if(!num.startsWith('55')) num = '55' + num; 
  
  const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
  const mesAtual = new Date().getMonth(); 
  const anoAtual = new Date().getFullYear(); 
  const mesNome = mesesNomes[mesAtual]; 
  const pago = aluno.meses[mesAtual]?.pago; 
  const statusTexto = pago ? "✅ PAGO" : "❌ *Pendente*"; 
  
  let msg = `🏛️ *INSTITUTO IMPACTO SOCIAL – Dojô de Karatê*\n\n`;
  msg += `Olá, *${aluno.nome}*!\n\n`;
  msg += `📆 *Referente à mensalidade de ${mesNome}/${anoAtual}*\n`;
  msg += `💰 *Valor:* R$ ${valorMensalidade.toFixed(2).replace('.',',')}\n`;
  msg += `📊 *Status:* ${statusTexto}\n\n`;
  
  if(!pago) {
    msg += `🔔 Identificamos que sua mensalidade ainda não foi quitada. Pedimos, por gentileza, a regularização.\n\n`;
    msg += `💳 *PIX:* 91991629403\n\n`;
  } else {
    msg += `✅ Agradecemos o pagamento em dia!\n\n`;
  }
  
  msg += `🥋 *Disciplina e Excelência*`;

  // Codifica a mensagem para o formato de link
  const msgCodificada = encodeURIComponent(msg);
  window.open(`https://wa.me/${num}?text=${msgCodificada}`, '_blank'); 
  
  showToast(`💬 Enviando para ${aluno.nome}...`, 'info'); 
}
// ==========================================

function calcularLucro() {
  const mesAtual = new Date().getMonth();
  let total = 0;
  alunos.forEach(a => { if(a.meses[mesAtual].pago) total += valorMensalidade; });
  document.getElementById('lucroMensalDisplay').textContent = `R$ ${total.toFixed(2).replace('.',',')}`;
}

function showToast(msg, tipo) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${tipo}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function removerAluno(idx) {
  if(confirm("Deseja excluir este aluno?")) {
    alunos.splice(idx, 1);
    salvar();
    renderizarTabela();
  }
}

function editarAluno(idx) {
  document.getElementById('editIndex').value = idx;
  document.getElementById('editNome').value = alunos[idx].nome;
  document.getElementById('editWhatsapp').value = alunos[idx].whatsapp;
  document.getElementById('editDataInicio').value = alunos[idx].dataInicio;
  document.getElementById('modalEditar').classList.add('active');
}

function fecharModalEditar() { document.getElementById('modalEditar').classList.remove('active'); }

function salvarEdicao() {
  const idx = document.getElementById('editIndex').value;
  alunos[idx].nome = document.getElementById('editNome').value;
  alunos[idx].whatsapp = document.getElementById('editWhatsapp').value;
  alunos[idx].dataInicio = document.getElementById('editDataInicio').value;
  salvar();
  fecharModalEditar();
  renderizarTabela();
}

function atualizarValorMensalidade() {
  valorMensalidade = parseFloat(document.getElementById('valorMensalidade').value);
  salvar();
  showToast("Valor atualizado!", "success");
}

function backupDados() {
  const data = JSON.stringify(alunos);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'backup_dojo.json';
  a.click();
}
</script>

</body>
</html>
